<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisaTime AI ✈️</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 45px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
      max-width: 450px;
      width: 100%;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo svg { width: 30px; height: 30px; }
    .logo span { font-size: 24px; font-weight: 700; color: #333; }
    input, select {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: border 0.3s ease;
    }
    input:focus, select:focus { border-color: #667eea; outline: none; }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover { background: #5a6cd4; transform: scale(1.02); }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .result {
      margin-top: 18px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      min-height: 24px;
    }
    @media(max-width:500px){ .card{padding:35px 20px;} }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- Simple airplane SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="#667eea" viewBox="0 0 24 24"><path d="M2.5 19l19-7-19-7v5l12 2-12 2v5z"/></svg>
      <span>VisaTime AI</span>
    </div>

    <input id="month" type="number" placeholder="Application Month (1-12)">
    <input id="years" type="number" placeholder="Years Since Start">
    <input id="day" type="number" placeholder="Day of Week (0-6)">

    <select id="season">
      <option value="" disabled selected>Select Season</option>
      <option value="Peak">Peak Season</option>
      <option value="off-peak">Off-Peak</option>
    </select>

    <select id="visa">
      <option value="" disabled selected>Select Visa Class</option>
      <option value="H1B">H1B</option>
      <option value="E3">E3</option>
      <option value="L1">L1</option>
    </select>

    <select id="country">
      <option value="" disabled selected>Select Country</option>
      <option value="INDIA">India</option>
      <option value="CHINA">China</option>
      <option value="USA">USA</option>
    </select>

    <select id="state">
      <option value="" disabled selected>Select State</option>
      <option value="CA">California</option>
      <option value="NY">New York</option>
      <option value="TX">Texas</option>
    </select>

    <button id="predict-btn" onclick="predict()">Predict Time</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    const BACKEND_URL = "https://ai-enabled-visa-status-prediction-and-1c2a.onrender.com/predict";

    async function predict(){
      const visa = document.getElementById("visa").value;
      const country = document.getElementById("country").value;
      const state = document.getElementById("state").value;
      const season = document.getElementById("season").value;

      if(!visa || !country || !state || !season){
        document.getElementById("result").innerText = "⚠️ Please fill all fields";
        return;
      }

      const data = {
        month: Number(document.getElementById("month").value),
        years: Number(document.getElementById("years").value),
        day: Number(document.getElementById("day").value),
        season, visa, country, state
      };

      const btn = document.getElementById("predict-btn");
      const resultDiv = document.getElementById("result");
      btn.disabled = true;
      resultDiv.innerHTML = '<span class="loader"></span> Predicting...';

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(()=>controller.abort(), 25000);

        const response = await fetch(BACKEND_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify(data),
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if(!response.ok) throw new Error(`Server returned ${response.status}`);
        const result = await response.json();

        if(result.error){
          resultDiv.innerText = "❌ " + result.error;
        }else{
          resultDiv.innerText = `✅ ${result.prediction} days (${result.range[0]} - ${result.range[1]} days)`;
        }

      }catch(err){
        if(err.name==="AbortError"){
          resultDiv.innerText = "❌ Request timed out. Backend may be asleep. Try again.";
        }else{
          resultDiv.innerText = "❌ Server error: " + err.message;
        }
      }finally{
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
