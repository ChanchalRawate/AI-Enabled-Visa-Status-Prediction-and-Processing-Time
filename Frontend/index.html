<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VisaTime AI</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .navbar {
      background: #2d3748;
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: bold;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    .title {
      margin-bottom: 20px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4c51bf;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:disabled {
      background: #888;
      cursor: not-allowed;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4c51bf;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="navbar">VisaTime AI ✈️</div>
  <div class="container">
    <div class="card">
      <h2 class="title">Visa Processing Predictor</h2>

      <input id="month" type="number" placeholder="Application Month (1-12)" />
      <input id="years" type="number" placeholder="Years Since Start" />
      <input id="day" type="number" placeholder="Day of Week (0-6)" />

      <select id="season">
        <option value="" disabled selected>Select Season</option>
        <option value="Peak">Peak Season</option>
        <option value="off-peak">Off-Peak</option>
      </select>

      <select id="visa">
        <option value="" disabled selected>Select Visa Class</option>
        <option value="H1B">H1B</option>
        <option value="E3">E3</option>
        <option value="L1">L1</option>
      </select>

      <select id="country">
        <option value="" disabled selected>Select Country</option>
        <option value="INDIA">India</option>
        <option value="CHINA">China</option>
        <option value="USA">USA</option>
      </select>

      <select id="state">
        <option value="" disabled selected>Select State</option>
        <option value="CA">California</option>
        <option value="NY">New York</option>
        <option value="TX">Texas</option>
      </select>

      <button id="predict-btn" onclick="predict()">Predict Time</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://ai-enabled-visa-status-prediction-and-1c2a.onrender.com/predict";

    async function predict() {
      const visa = document.getElementById("visa").value;
      const country = document.getElementById("country").value;
      const state = document.getElementById("state").value;
      const season = document.getElementById("season").value;

      if (!visa || !country || !state || !season) {
        document.getElementById("result").innerText = "⚠️ Please fill all fields";
        return;
      }

      const month = Number(document.getElementById("month").value);
      const years = Number(document.getElementById("years").value);
      const day = Number(document.getElementById("day").value);

      const data = { month, years, day, season, visa, country, state };
      const btn = document.getElementById("predict-btn");
      const resultDiv = document.getElementById("result");

      btn.disabled = true;
      resultDiv.innerHTML = '<span class="loader"></span>⏳ Predicting...';

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 25000); // 25s timeout

        const response = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        if (!response.ok) throw new Error(`Server returned ${response.status}`);

        const result = await response.json();

        if (result.error) {
          resultDiv.innerText = "❌ " + result.error;
        } else {
          resultDiv.innerText =
            `✅ ${result.prediction} days (${result.range[0]} - ${result.range[1]} days)`;
        }

      } catch (err) {
        if (err.name === "AbortError") {
          resultDiv.innerText = "❌ Request timed out. Render may be asleep. Try again in a minute.";
        } else {
          resultDiv.innerText = "❌ Server error: " + err.message;
        }
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
